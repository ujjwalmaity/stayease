spring:
  datasource:
    url: jdbc:h2:mem:stayease;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always
app:
  jwt:
    secret: ${JWT_SECRET:ZmFrZS1zZWNyZXQta2V5LWZvci1zdGF5ZWFzZS1jaGFuZ2UtbWUtaW4tcHJvZHVjdGlvbi0xMjM0NTY3OA==}
